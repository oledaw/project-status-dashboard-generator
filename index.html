<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMO Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="dashboard">

    <!-- HEADER -->
    <div class="project-header">
      <div class="project-title" id="projectTitle"></div>
      <a class="project-link" id="projectLink" href="#" target="_blank">Otwórz kartę projektu →</a>
    </div>

    <div class="divider"></div>

    <!-- ANKIETA PRZEWIDYWALNOŚCI -->
    <div class="section">
      <div class="survey-header">
        <div class="survey-title-group">
          <h2 class="section-title" id="predictabilityDate"></h2>
          <div class="survey-nav">
            <button class="nav-btn" id="predPrev">‹</button>
            <button class="nav-btn" id="predNext">›</button>
          </div>
        </div>
        <a class="project-link" href="https://oledaw.github.io/project-predictability-assessment/" target="_blank">Otwórz ankietę →</a>
      </div>

      <div class="grid">
        <div class="panel">
          <h3>Score</h3>
          <div id="predictabilityScore" class="score" style="font-size:32px; margin:0;"></div>
          <div id="predictabilityLevel" class="item"></div>
        </div>
        <div class="panel">
          <h3>Scoring obszarów (1-5)</h3>
          <div id="areaScores" class="kpi-grid"></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ANKIETA STATUSOWA -->
    <div class="section">
      <div class="survey-header">
        <div class="survey-title-group">
          <h2 class="section-title" id="surveyDate"></h2>
          <div class="survey-nav">
            <button class="nav-btn" id="surveyPrev">‹</button>
            <button class="nav-btn" id="surveyNext">›</button>
          </div>
        </div>
        <a class="project-link" href="https://oledaw.github.io/projectweeklystatus/" target="_blank">Otwórz ankietę →</a>
      </div>

      <div class="grid">
        <div class="panel">
          <div class="status" id="status"></div>
          <div class="score" id="score"></div>
          <div class="trend" id="trend"></div>
          <div class="summary" id="summary"></div>
        </div>
        <div class="panel">
          <h3>Scoring obszarów</h3>
          <div class="kpi-grid" id="kpis"></div>
        </div>
        <div class="panel" id="pmCommentPanel" style="grid-column: 1 / -1; display: none;">
          <h3>Komentarz PM</h3>
          <div id="pmComment" style="font-size: 13px; color: #3A3632; line-height: 1.6;"></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- REJESTR RYZYK -->
    <div class="section">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 class="section-title">Rejestr ryzyk</h2>
        <a class="project-link" href="https://oledaw.github.io/riskregister/" target="_blank">Otwórz rejestr ryzyk →</a>
      </div>
      <div class="grid">
        <div class="panel">
          <h3>Top risks</h3>
          <div id="risks"></div>
        </div>
        <div class="panel">
          <h3>Actions</h3>
          <div id="actions"></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- PLANNER -->
    <div class="section">
      <h2 class="section-title">Planner</h2>
      <div class="planner-grid">

        <div class="panel">
          <div id="calendar"></div>
        </div>

        <div class="panel">
          <h3>Timeline</h3>
          <div id="timeline"></div>
        </div>

        <div class="panel tasks-panel">
          <details class="tasks-collapsible">
            <summary><h3>Tasks</h3></summary>
            <div id="tasks"></div>
          </details>
        </div>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
